<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER-ULTIMA | Quantum Symbolic Engine</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root {
            --m-color: #00d2ff; --p-color: #bc13fe; --c-color: #39ff14;
            --bg: #020406; --panel: rgba(15, 18, 25, 0.98);
        }

        body {
            background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace;
            margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, #0a1128 0%, #020406 100%);
        }

        .calc-container {
            width: 900px; height: 650px; background: var(--panel);
            border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);
            display: grid; grid-template-columns: 1fr 350px; gap: 20px; padding: 25px;
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
        }

        /* Display System */
        .display-system {
            grid-column: span 2; background: #000; border-radius: 15px; padding: 20px;
            border-left: 5px solid var(--m-color); position: relative;
        }
        #history { font-size: 0.85rem; color: #444; margin-bottom: 5px; }
        #main-input { font-family: 'Orbitron'; font-size: 2.2rem; color: var(--m-color); outline: none; border: none; background: transparent; width: 100%; text-align: right; }

        /* Left Side: Controls */
        .control-side { display: flex; flex-direction: column; gap: 15px; }
        
        .mode-tabs { display: flex; gap: 5px; }
        .tab { flex: 1; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid #333; color: #666; cursor: pointer; border-radius: 8px; font-size: 0.7rem; transition: 0.3s; }
        .tab.active { background: rgba(0,210,255,0.1); color: var(--m-color); border-color: var(--m-color); }

        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        button { background: rgba(255,255,255,0.05); border: 1px solid #222; color: #ccc; padding: 15px 5px; border-radius: 10px; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
        button:hover { background: rgba(255,255,255,0.1); color: #fff; transform: scale(1.02); border-color: #555; }
        
        .op { color: var(--m-color); font-weight: bold; }
        .solve-btn { grid-column: span 2; background: var(--m-color); color: #000; font-weight: bold; font-family: 'Orbitron'; font-size: 1.2rem; }
        .solve-btn:hover { background: #fff; box-shadow: 0 0 20px var(--m-color); }

        /* Right Side: Visuals */
        .visual-side { display: flex; flex-direction: column; gap: 15px; border-left: 1px solid #222; padding-left: 20px; }
        .graph-area { flex-grow: 1; background: #000; border-radius: 15px; border: 1px solid #111; overflow: hidden; position: relative; }
        canvas { width: 100%; height: 100%; }
        
        .neural-log { height: 120px; background: rgba(0,255,100,0.03); border: 1px solid rgba(0,255,100,0.1); padding: 10px; font-size: 0.65rem; color: var(--c-color); overflow-y: auto; border-radius: 10px; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="calc-container">
    <!-- DISPLAY -->
    <div class="display-system">
        <div id="history">AWAITING INPUT...</div>
        <input type="text" id="main-input" value="0" spellcheck="false">
    </div>

    <!-- LEFT: CALCULATION CORE -->
    <div class="control-side">
        <div class="mode-tabs">
            <div class="tab active" id="m-tab" onclick="setMode('math')">MATHEMATICS</div>
            <div class="tab" id="p-tab" onclick="setMode('phys')">PHYSICS</div>
            <div class="tab" id="c-tab" onclick="setMode('chem')">CHEMISTRY</div>
        </div>

        <!-- MATH GRID (WITH CALCULUS) -->
        <div id="math-grid" class="mode-content">
            <div class="btn-grid">
                <button class="op" onclick="ins('derivative(\'', '\', \'x\')')">d/dx</button>
                <button class="op" onclick="ins('simplify(\'', '\')')">SIMP</button>
                <button class="op" onclick="ins('det([', '])')">|M|</button>
                <button style="color:#ff4444" onclick="clr()">AC</button>
                
                <button onclick="ins('sin(')">sin</button>
                <button onclick="ins('cos(')">cos</button>
                <button onclick="ins('tan(')">tan</button>
                <button class="op" onclick="ins('/')">/</button>

                <button onclick="ins('7')">7</button><button onclick="ins('8')">8</button><button onclick="ins('9')">9</button>
                <button class="op" onclick="ins('*')">×</button>

                <button onclick="ins('4')">4</button><button onclick="ins('5')">5</button><button onclick="ins('6')">6</button>
                <button class="op" onclick="ins('-')">-</button>

                <button onclick="ins('1')">1</button><button onclick="ins('2')">2</button><button onclick="ins('3')">3</button>
                <button class="op" onclick="ins('+')">+</button>

                <button onclick="ins('0')">0</button><button onclick="ins('.')">.</button>
                <button class="solve-btn" onclick="execute()">=</button>
            </div>
        </div>

        <!-- PHYSICS GRID -->
        <div id="phys-grid" class="mode-content hidden">
            <div class="btn-grid">
                <button onclick="ins('299792458')">c</button>
                <button onclick="ins('6.626e-34')">h</button>
                <button onclick="ins('9.81')">g</button>
                <button onclick="ins('6.67e-11')">G</button>
                <button class="op" onclick="ins('^2')">x²</button>
                <button class="op" onclick="ins('^')">xⁿ</button>
                <button class="op" onclick="ins('sqrt(')">√</button>
                <button class="op" onclick="ins('log(')">log</button>
                <button class="solve-btn" onclick="execute()" style="background:var(--p-color)">=</button>
                <button class="solve-btn" onclick="draw()" style="background:#fff">PLOT</button>
            </div>
        </div>

        <!-- CHEMISTRY GRID -->
        <div id="chem-grid" class="mode-content hidden">
            <div class="btn-grid">
                <button onclick="ins('6.022e23')">N<sub>A</sub></button>
                <button onclick="ins('8.314')">R</button>
                <button onclick="ins('1.008')">H</button>
                <button onclick="ins('12.01')">C</button>
                <button onclick="ins('14.01')">N</button>
                <button onclick="ins('16.00')">O</button>
                <button onclick="ins('22.99')">Na</button>
                <button onclick="ins('35.45')">Cl</button>
                <button class="solve-btn" onclick="execute()" style="background:var(--c-color)">=</button>
                <button onclick="ins('(')">(</button><button onclick="ins(')')">)</button>
            </div>
        </div>
    </div>

    <!-- RIGHT: VISUALIZER -->
    <div class="visual-side">
        <div class="graph-area">
            <canvas id="canvas"></canvas>
            <div style="position:absolute; top:10px; left:10px; font-size:0.6rem; color:#444;">V-SPACE GRAPH</div>
        </div>
        <div class="neural-log" id="log">
            > AETHER OS v5.0 Loaded...<br>> Symbolic Math Engine Ready.
        </div>
    </div>
</div>

<script>
    const input = document.getElementById('main-input');
    const hist = document.getElementById('history');
    const log = document.getElementById('log');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // Advanced Insert: Handles complex functions like derivative('', 'x')
    function ins(pre, post = "") {
        const start = input.selectionStart;
        const end = input.selectionEnd;
        const text = input.value;
        input.value = text.slice(0, start) + pre + post + text.slice(end);
        input.focus();
        // Move cursor between the quotes/brackets
        input.setSelectionRange(start + pre.length, start + pre.length);
    }

    function clr() { input.value = "0"; hist.innerText = ""; }

    function setMode(mode) {
        document.querySelectorAll('.mode-content').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById(mode + '-grid').classList.remove('hidden');
        document.getElementById(mode[0] + '-tab').classList.add('active');
        
        const color = mode === 'math' ? 'var(--m-color)' : mode === 'phys' ? 'var(--p-color)' : 'var(--c-color)';
        document.querySelector('.display-system').style.borderColor = color;
        input.style.color = color;
    }

    function execute() {
        try {
            let val = input.value;
            // Process Symbolic Math
            let result = math.evaluate(val);
            
            // Format if it's a symbolic derivative object
            if(result && result.isNode) result = result.toString();
            
            hist.innerText = val + " =";
            input.value = result;
            log.innerHTML += `<br>> Result: ${result}`;
        } catch (e) {
            log.innerHTML += `<br>> [!] ERROR: ${e.message}`;
        }
    }

    function draw() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        ctx.clearRect(0,0,canvas.width, canvas.height);
        
        // Draw Axis
        ctx.strokeStyle = '#222';
        ctx.beginPath();
        ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height);
        ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2);
        ctx.stroke();

        // Plot
        ctx.strokeStyle = 'cyan';
        ctx.beginPath();
        for(let x = -20; x <= 20; x += 0.1) {
            try {
                let y = math.evaluate(input.value, {x: x});
                let px = canvas.width/2 + (x * 10);
                let py = canvas.height/2 - (y * 10);
                if(x === -20) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            } catch(e) {}
        }
        ctx.stroke();
        log.innerHTML += "<br>> Function Vector Rendered.";
    }
</script>

</body>
</html>
