<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AETHER-OMNI v6 | Ultimate Suite</title>
    <!-- Math.js for Symbolic Logic -->
    <script src="https://cdnjs.cloudflare.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root {
            --m-blue: #00d2ff; --p-purple: #bc13fe; --c-green: #39ff14;
            --bg: #05070a; --glass: rgba(18, 22, 30, 0.98);
        }

        body {
            background-color: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace;
            margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh;
            overflow: hidden; touch-action: manipulation;
        }

        .calc-box {
            width: 95%; max-width: 500px; background: var(--glass); padding: 25px;
            border-radius: 35px; border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 0 80px rgba(0,0,0,0.9); backdrop-filter: blur(30px);
        }

        /* Screen with No-Keyboard Input */
        .screen {
            background: #000; border-radius: 20px; padding: 20px; margin-bottom: 20px;
            border-left: 4px solid var(--m-blue); box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }
        #hist { font-size: 0.75rem; color: #444; min-height: 18px; text-align: right; }
        
        /* inputmode="none" is the secret to blocking the mobile keyboard */
        #display {
            width: 100%; border: none; background: transparent; color: var(--m-blue);
            font-family: 'Orbitron'; font-size: 2.2rem; text-align: right; outline: none;
            caret-color: var(--m-blue);
        }

        /* Mode Switcher */
        .mode-bar { display: flex; gap: 8px; margin-bottom: 20px; }
        .m-tab {
            flex: 1; padding: 12px; background: rgba(255,255,255,0.03); border: 1px solid #222;
            border-radius: 12px; cursor: pointer; font-size: 0.7rem; font-weight: bold;
            transition: 0.3s; text-align: center; color: #666;
        }
        .m-tab.active { background: rgba(0,210,255,0.1); color: var(--m-blue); border-color: var(--m-blue); }

        /* Grids */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .hidden { display: none; }

        button {
            background: rgba(255,255,255,0.05); border: 1px solid #222;
            color: #ddd; padding: 18px 5px; border-radius: 14px; cursor: pointer;
            font-size: 0.9rem; transition: 0.15s; user-select: none;
        }
        button:active { transform: scale(0.92); background: rgba(255,255,255,0.2); }

        .op { color: var(--m-blue); font-weight: bold; }
        .del { color: #ff4444; font-weight: bold; }
        .exe { grid-column: span 2; background: linear-gradient(90deg, var(--m-blue), var(--p-purple)); color: #fff; font-weight: bold; font-family: 'Orbitron'; }
    </style>
</head>
<body>

<div class="calc-box">
    <div class="screen">
        <div id="hist">AWAITING_COMMAND</div>
        <!-- inputmode="none" stops the phone keyboard -->
        <input type="text" id="display" value="0" inputmode="none" readonly>
    </div>

    <div class="mode-bar">
        <div id="t-math" class="m-tab active" onclick="setM('math')">MATH</div>
        <div id="t-phys" class="m-tab" onclick="setM('phys')">PHYSICS</div>
        <div id="t-chem" class="m-tab" onclick="setM('chem')">CHEMISTRY</div>
    </div>

    <!-- MAIN GRID (MATH + CALCULUS) -->
    <div id="g-math" class="grid">
        <button class="del" onclick="reset()">AC</button>
        <button class="del" onclick="back()">⌫</button>
        <button class="op" onclick="ins('derivative(\'', '\', \'x\')')">d/dx</button>
        <button class="op" onclick="ins('/')">/</button>

        <button onclick="ins('7')">7</button><button onclick="ins('8')">8</button><button onclick="ins('9')">9</button>
        <button class="op" onclick="ins('*')">×</button>

        <button onclick="ins('4')">4</button><button onclick="ins('5')">5</button><button onclick="ins('6')">6</button>
        <button class="op" onclick="ins('-')">-</button>

        <button onclick="ins('1')">1</button><button onclick="ins('2')">2</button><button onclick="ins('3')">3</button>
        <button class="op" onclick="ins('+')">+</button>

        <button onclick="ins('0')">0</button><button onclick="ins('.')">.</button>
        <button class="exe" onclick="solve()">=</button>
    </div>

    <!-- PHYSICS GRID (INTEGRATION + CONSTANTS) -->
    <div id="g-phys" class="grid hidden">
        <!-- integration syntax: integrate('func', 'var', start, end) -->
        <button class="op" onclick="ins('integrate(\'', '\', x, 0, 1)')">∫dx</button>
        <button class="op" onclick="ins('simplify(\'', '\')')">SIMP</button>
        <button onclick="ins('299792458')">c</button>
        <button onclick="ins('9.81')">g</button>

        <button onclick="ins('sin(')">sin</button><button onclick="ins('cos(')">cos</button><button onclick="ins('tan(')">tan</button>
        <button class="op" onclick="ins('sqrt(')">√</button>

        <button onclick="ins('pi')">π</button><button onclick="ins('e')">e</button>
        <button class="exe" onclick="solve()" style="background:var(--p-purple)">=</button>
    </div>

    <!-- CHEMISTRY GRID -->
    <div id="g-chem" class="grid hidden">
        <button onclick="ins('6.022e23')">N<sub>A</sub></button>
        <button onclick="ins('8.314')">R</button>
        <button onclick="ins('(')">(</button><button onclick="ins(')')">)</button>
        
        <button onclick="ins('1.008')">H</button><button onclick="ins('12.01')">C</button>
        <button onclick="ins('14.01')">N</button><button onclick="ins('16.00')">O</button>

        <button onclick="ins('22.99')">Na</button><button onclick="ins('35.45')">Cl</button>
        <button class="exe" onclick="solve()" style="background:var(--c-green); color:#000;">=</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');
    const history = document.getElementById('hist');

    // 1. One-Click One-Digit Remove (Backspace)
    function back() {
        if (display.value.length > 1) {
            display.value = display.value.slice(0, -1);
        } else {
            display.value = "0";
        }
    }

    function reset() {
        display.value = "0";
        history.innerText = "MEM_PURGED";
    }

    // 2. Intelligent Insertion
    function ins(pre, post = "") {
        if (display.value === "0") display.value = "";
        display.value += pre + post;
    }

    // 3. Mode Switcher Logic
    function setM(mode) {
        document.querySelectorAll('.grid').forEach(g => g.classList.add('hidden'));
        document.querySelectorAll('.m-tab').forEach(t => t.classList.remove('active'));
        
        document.getElementById('g-' + mode).classList.remove('hidden');
        document.getElementById('t-' + mode).classList.add('active');
        
        let color = mode === 'math' ? 'var(--m-blue)' : mode === 'phys' ? 'var(--p-purple)' : 'var(--c-green)';
        display.style.color = color;
        document.querySelector('.screen').style.borderColor = color;
    }

    // 4. Symbolic & Advanced Calculation Engine
    function solve() {
        try {
            let expr = display.value;
            let result = math.evaluate(expr);
            
            // Format result
            if (typeof result === 'number') result = +result.toFixed(8);
            if (result && result.isNode) result = result.toString(); // For symbolic d/dx
            
            history.innerText = expr + " =";
            display.value = result;
        } catch (e) {
            display.value = "SYNTAX_ERR";
            console.error(e);
        }
    }

    // Prevent double-tap zoom which causes lag
    document.addEventListener('touchstart', function (event) {
        if (event.touches.length > 1) {
            event.preventDefault();
        }
    }, { passive: false });
</script>

</body>
</html>
